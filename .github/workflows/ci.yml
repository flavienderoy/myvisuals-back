# ================================
# Visuals.co — CI Pipeline
# ================================
# Runs on every push and pull request
# Jobs: lint → test → build

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────
  # Job 1: Lint
  # ─────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Lint client
        working-directory: ./client
        run: npm run lint

  # ─────────────────────────────────
  # Job 2: Test
  # ─────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      # --- Frontend Tests ---
      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Run client unit tests
        working-directory: ./client
        run: npm run test:unit

      # --- Backend Tests ---
      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Run API tests
        working-directory: ./server
        run: npm run test:api
        env:
          NODE_ENV: test
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  # ─────────────────────────────────
  # Job 3: Build
  # ─────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Build client for production
        working-directory: ./client
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Verify build output exists
        working-directory: ./client
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed — dist/ not found"
            exit 1
          fi
          echo "✅ Build successful — dist/ exists"
          ls -la dist/

  # ─────────────────────────────────
  # Job 4: Docker Build (verify)
  # ─────────────────────────────────
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: ./server
        run: docker build -t visuals-api:ci .

      - name: Verify Docker image
        run: docker images visuals-api:ci
