# ================================
# Visuals.co — Backend CI/CD
# Lint → Test → Docker → Deploy
# Backend: Google Cloud Run (europe-west1)
# (The frontend lives in the myvisuals-client repo with its own pipeline.)
# ================================

name: Backend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GCP_REGION: europe-west1
  CLOUD_RUN_SERVICE: visuals-api

jobs:
  # ─────────────────────────────────
  # Job 1: Lint
  # ─────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        working-directory: ./server
        run: npm ci
      - name: Run ESLint
        working-directory: ./server
        run: npm run lint

  # ─────────────────────────────────
  # Job 2: API tests + coverage
  # ─────────────────────────────────
  test:
    name: 🧪 Test API
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        working-directory: ./server
        run: npm ci
      - name: Run API tests with coverage
        working-directory: ./server
        run: npm run test:coverage
        env:
          NODE_ENV: test
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  # ─────────────────────────────────
  # Job 3: Docker build (verify image builds)
  # ─────────────────────────────────
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        working-directory: ./server
        run: docker build -t visuals-api:ci .
      - name: Verify Docker image
        run: docker images visuals-api:ci
      # Smoke test: actually BOOT the container and hit /health.
      # `docker build` alone never runs the app, so a missing runtime file
      # (e.g. an un-COPYed source dir) would pass build but crash on Cloud Run.
      - name: Smoke test — boot container & check /health
        run: |
          docker run -d --name visuals-api-smoke -p 8080:8080 \
            -e NODE_ENV=production \
            -e SUPABASE_URL=https://placeholder.supabase.co \
            -e SUPABASE_SERVICE_ROLE_KEY=placeholder \
            visuals-api:ci
          echo "Waiting for the app to start…"
          for i in $(seq 1 15); do
            if curl -fsS http://localhost:8080/health >/dev/null 2>&1; then
              echo "✅ /health responded — container boots correctly"
              docker rm -f visuals-api-smoke >/dev/null
              exit 0
            fi
            sleep 2
          done
          echo "❌ Container failed to serve /health within 30s — dumping logs:"
          docker logs visuals-api-smoke || true
          docker rm -f visuals-api-smoke >/dev/null
          exit 1

  # ─────────────────────────────────
  # Job 4: Deploy backend (Google Cloud Run)
  # ─────────────────────────────────
  deploy-backend:
    name: 🚀 Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Build & Deploy to Cloud Run
        run: |
          # Step 1: Explicitly clear old secrets from the service to avoid type conflicts
          # (We use || true so it doesn't fail if the service or secrets don't exist yet)
          gcloud run services update $CLOUD_RUN_SERVICE --region $GCP_REGION --clear-secrets || true
          
          # Step 2: Deploy with standard environment variables
          gcloud run deploy $CLOUD_RUN_SERVICE \
            --source ./server \
            --region $GCP_REGION \
            --allow-unauthenticated \
            --set-env-vars "NODE_ENV=production,CLIENT_URL=${{ secrets.CLIENT_URL }},SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
